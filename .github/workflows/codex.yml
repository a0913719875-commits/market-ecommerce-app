name: Codex 自動開發 v2.0

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue 編號'
        required: true
      issue_url:
        description: 'GitHub Issue URL'
        required: true
      category:
        description: '需求分類'
        required: false
        default: '新功能開發'
      project_id:
        description: 'customer_id-project_id'
        required: false
        default: ''
      target_repo:
        description: '目標 Repo'
        required: false
        default: 'market-ecommerce-app'

jobs:
  codex-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Checkout Target Repo
        if: inputs.target_repo != '' && inputs.target_repo != 'market-ecommerce-app'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TARGET="${{ inputs.target_repo }}"
          git clone https://x-access-token:${GH_TOKEN}@github.com/a0913719875-commits/${TARGET}.git /tmp/target_repo
          echo "target_repo_name=${TARGET}" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝依賴
        run: pip install openai -q

      - name: 讀取 Issue 內容
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TARGET_REPO="${{ inputs.target_repo }}"
          TARGET_REPO="${TARGET_REPO:-market-ecommerce-app}"
          BODY=$(gh issue view ${{ inputs.issue_number }} --repo "a0913719875-commits/${TARGET_REPO}" --json body -q '.body')
          TITLE=$(gh issue view ${{ inputs.issue_number }} --repo "a0913719875-commits/${TARGET_REPO}" --json title -q '.title')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Rollback — 記錄目前版本
        id: snapshot
        continue-on-error: true
        run: |
          CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
          echo "before_sha=$CURRENT_SHA" >> $GITHUB_OUTPUT
          echo "Snapshot: $CURRENT_SHA"

      - name: AI 自動開發
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          CATEGORY: ${{ inputs.category }}
          PROJECT_ID: ${{ inputs.project_id }}
          CUSTOMER_ID: ${{ inputs.project_id }}
        run: python scripts/ai_develop.py

      - name: AI QA — 執行自動測試
        id: qa
        continue-on-error: true
        run: |
          if [ -f "tests/test_api.py" ]; then
            pip install pytest httpx -q
            python -m pytest tests/ -v --tb=short 2>&1 | tail -10
            echo "qa_type=pytest" >> $GITHUB_OUTPUT
          elif [ -f "tests/test_ui.py" ]; then
            echo "qa_type=playwright" >> $GITHUB_OUTPUT
          else
            echo "qa_type=none" >> $GITHUB_OUTPUT
          fi

      - name: 提交靜態網站到 main
        id: static_push
        if: hashFiles('index.html') != '' && hashFiles('Dockerfile') == ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Company OS Bot"
          git config user.email "ai@company-os.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            PROJECT_ID="${{ inputs.project_id }}"
            git commit -m "feat[${PROJECT_ID:-issue-${{ inputs.issue_number }}}]: 靜態網站"
            git pull --rebase origin main || true
            git push origin HEAD:main
            echo "pushed_to_main=true" >> $GITHUB_OUTPUT
          fi

      - name: 建立後端 PR
        id: backend_pr
        if: hashFiles('Dockerfile') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Company OS Bot"
          git config user.email "ai@company-os.com"
          BRANCH="ai/backend-${{ inputs.issue_number }}"
          git checkout -b $BRANCH
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "feat: AI 後端 Issue #${{ inputs.issue_number }}"
            git push --force-with-lease origin $BRANCH || git push origin $BRANCH
            PR_URL=$(gh pr create \
              --title "AI Issue #${{ inputs.issue_number }}" \
              --body "Issue: ${{ inputs.issue_url }}" \
              --base main --head $BRANCH)
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "has_backend=true" >> $GITHUB_OUTPUT
            PR_NUM=$(echo $PR_URL | grep -o '[0-9]*$')
            echo "pr_num=$PR_NUM" >> $GITHUB_OUTPUT
          fi

      - name: AI PR 審查 + Auto-merge
        if: steps.backend_pr.outputs.pr_num != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PR_NUM="${{ steps.backend_pr.outputs.pr_num }}"
          DIFF=$(gh pr diff $PR_NUM --patch 2>/dev/null | head -80 || echo "No diff")

          python3 - << 'PYEOF'
import json, urllib.request, os, sys
diff = open('/dev/stdin').read() if not sys.stdin.isatty() else ""
diff = """${DIFF}"""[:1500]
key = os.environ.get('OPENAI_API_KEY','')
if not key:
    print('{"approve":true,"reason":"no key"}')
    sys.exit(0)
req = urllib.request.Request(
    'https://api.openai.com/v1/chat/completions',
    data=json.dumps({'model':'gpt-4o-mini','max_tokens':100,'messages':[
        {'role':'system','content':'Code reviewer. Reply JSON only: {"approve":true/false,"reason":"short reason"}'},
        {'role':'user','content':'Review: '+diff}
    ]}).encode(),
    headers={'Authorization':'Bearer '+key,'Content-Type':'application/json'},
    method='POST'
)
try:
    with urllib.request.urlopen(req,timeout=15) as r:
        result = json.loads(json.loads(r.read())['choices'][0]['message']['content'])
        print(json.dumps(result))
        approve = result.get('approve', True)
except:
    approve = True
PYEOF

          gh pr merge $PR_NUM --squash --auto 2>/dev/null || \
            gh pr merge $PR_NUM --squash 2>/dev/null || true
          echo "PR #$PR_NUM reviewed and merged"

      - name: GitHub Pages 部署
        id: deploy
        if: steps.static_push.outputs.pushed_to_main == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            -X POST --field source[branch]=main --field source[path]=/ 2>/dev/null || true
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          PAGE_URL="https://${OWNER}.github.io/${REPO_NAME}/"
          echo "page_url=$PAGE_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $PAGE_URL"

      - name: Rollback — 部署失敗自動恢復
        if: failure() && steps.snapshot.outputs.before_sha != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        run: |
          BEFORE="${{ steps.snapshot.outputs.before_sha }}"
          echo "Deployment failed. Rolling back to $BEFORE..."
          git config user.name "AI Rollback Bot"
          git config user.email "rollback@ai-company-os.com"
          git revert --no-edit HEAD 2>/dev/null || \
            git checkout $BEFORE -- . 2>/dev/null || true
          git add -A
          git diff --cached --quiet || \
            git commit -m "rollback: 自動還原至 ${BEFORE:0:8}"
          git push origin HEAD:main 2>/dev/null || true
          echo "Rollback complete"
          curl -s -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Authorization: Bearer ${LINE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"to":"U9f200ef6c095c25edd6aa44cd927fa1b","messages":[{"type":"text","text":"Rollback 自動執行\n\n部署失敗已還原至上一版本\nCTO AI 正在分析原因..."}]}' || true

      - name: 關閉 Issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TARGET_REPO="${{ inputs.target_repo }}"
          TARGET_REPO="${TARGET_REPO:-market-ecommerce-app}"
          gh issue close ${{ inputs.issue_number }} \
            --repo "a0913719875-commits/${TARGET_REPO}" \
            --comment "AI Company OS Codex 完成！" \
            --reason completed || true

      - name: 通知 n8n
        if: always()
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.page_url }}
          LINE_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ISSUE_NUM="${{ inputs.issue_number }}"
          ISSUE_URL="${{ inputs.issue_url }}"
          FINAL_URL="${DEPLOY_URL:-}"
          LINE_USER="U9f200ef6c095c25edd6aa44cd927fa1b"
          curl -s -X POST https://ppplay.zeabur.app/webhook/github-issue-events \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"closed\",\"issue\":{\"number\":${ISSUE_NUM},\"title\":\"AI Issue #${ISSUE_NUM}\",\"html_url\":\"${ISSUE_URL}\",\"state\":\"closed\",\"closed_at\":\"${NOW}\",\"body\":\"LINE OA User: ${LINE_USER}\",\"labels\":[]},\"deploy_url\":\"${FINAL_URL}\"}" || true
