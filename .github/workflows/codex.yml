name: Codex 自動開發

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue 編號'
        required: true
      issue_url:
        description: 'GitHub Issue URL'
        required: true
      category:
        description: '需求分類'
        required: false
        default: '新功能開發'

jobs:
  codex-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 讀取 Issue 內容
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh issue view ${{ inputs.issue_number }} --json body -q '.body')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          TITLE=$(gh issue view ${{ inputs.issue_number }} --json title -q '.title')
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: 提取 Codex Prompt
        id: prompt
        run: |
          # 從 Issue body 提取 ## Codex Prompt 區塊
          PROMPT=$(echo '${{ steps.issue.outputs.body }}' | \
            awk '/^## Codex Prompt/{found=1; next} found && /^## /{exit} found{print}' | \
            sed 's/^```//;s/```$//' | tr -d '\r')
          echo "prompt<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 安裝 Codex CLI
        run: npm install -g @openai/codex

      - name: 執行 Codex 自動開發
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          BRANCH="codex/issue-${{ inputs.issue_number }}"
          git checkout -b $BRANCH

          # 執行 Codex 開發
          codex --approval-mode full-auto \
            --model gpt-4o \
            "${{ steps.prompt.outputs.prompt }}"

      - name: 提交變更
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="codex/issue-${{ inputs.issue_number }}"
          git config user.name "Codex Bot"
          git config user.email "codex-bot@github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "沒有變更，跳過 PR 建立"
            exit 0
          fi

          git commit -m "feat: Codex 自動開發 - Issue #${{ inputs.issue_number }}

          分類：${{ inputs.category }}
          Issue：${{ inputs.issue_url }}"

          git push origin $BRANCH

          # 建立 PR
          gh pr create \
            --title "🤖 [Codex] ${{ steps.issue.outputs.title }}" \
            --body "## 自動開發說明

          由 Codex 根據 Issue #${{ inputs.issue_number }} 自動生成。

          **關聯 Issue：** ${{ inputs.issue_url }}
          **分類：** ${{ inputs.category }}

          ## 測試項目
          - [ ] 功能測試通過
          - [ ] 無 Breaking Changes
          - [ ] 已更新相關文件

          Closes #${{ inputs.issue_number }}" \
            --base main \
            --head $BRANCH

      - name: 通知 n8n Issue 已處理
        if: always()
        run: |
          curl -s -X POST https://ppplay.zeabur.app/webhook/github-issue-events \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"codex_completed\",\"issue\":{\"number\":${{ inputs.issue_number }},\"title\":\"${{ steps.issue.outputs.title }}\",\"html_url\":\"${{ inputs.issue_url }}\"}}"
