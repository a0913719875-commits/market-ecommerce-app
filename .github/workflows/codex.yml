name: Codex 自動開發

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue 編號'
        required: true
      issue_url:
        description: 'GitHub Issue URL'
        required: true
      category:
        description: '需求分類'
        required: false
        default: '新功能開發'

jobs:
  codex-develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝依賴
        run: pip install openai -q

      - name: 讀取 Issue 內容
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh issue view ${{ inputs.issue_number }} --json body -q '.body')
          TITLE=$(gh issue view ${{ inputs.issue_number }} --json title -q '.title')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: AI 自動開發
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          CATEGORY: ${{ inputs.category }}
        run: python scripts/ai_develop.py

      - name: 提交變更並建立 PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai/issue-${{ inputs.issue_number }}"
          git config user.name "AI Developer Bot"
          git config user.email "ai-dev@github.com"
          git checkout -b $BRANCH
          git add -A

          if git diff --cached --quiet; then
            echo "沒有新檔案，直接關閉 Issue"
          else
            git commit -m "feat(AI): 自動開發 Issue #${{ inputs.issue_number }}"
            git push origin $BRANCH
            gh pr create \
              --title "🤖 [AI] ${{ steps.issue.outputs.title }}" \
              --body "## AI 自動開發完成

          Issue：${{ inputs.issue_url }}
          分類：${{ inputs.category }}

          Closes #${{ inputs.issue_number }}" \
              --base main \
              --head $BRANCH
          fi

      - name: 關閉 Issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ inputs.issue_number }} \
            --comment "✅ AI 自動開發完成！" \
            --reason completed || true

      - name: 通知 n8n 完成
        if: always()
        run: |
          STATUS="${{ job.status }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -s -X POST https://ppplay.zeabur.app/webhook/github-issue-events \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"closed\",\"issue\":{\"number\":${{ inputs.issue_number }},\"title\":\"${{ steps.issue.outputs.title }}\",\"html_url\":\"${{ inputs.issue_url }}\",\"state\":\"closed\",\"closed_at\":\"$NOW\",\"body\":\"LINE OA 用戶：\`U9f200ef6c095c25edd6aa44cd927fa1b\`\",\"labels\":[]}}" || true
