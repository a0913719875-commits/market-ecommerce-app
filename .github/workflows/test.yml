name: 自動測試

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 執行 Lint
        run: npm run lint --if-present

      - name: 執行單元測試
        run: npm test --if-present

      - name: 執行整合測試
        run: npm run test:integration --if-present
        env:
          NODE_ENV: test

      - name: 建構測試
        run: npm run build --if-present

      - name: 測試通過 - 通知 n8n 觸發部署
        if: success() && github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST https://ppplay.zeabur.app/webhook/deploy-trigger \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"test_passed\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"repo\": \"${{ github.repository }}\",
              \"actor\": \"${{ github.actor }}\"
            }"

      - name: 測試失敗 - 通知 n8n
        if: failure()
        run: |
          curl -s -X POST https://ppplay.zeabur.app/webhook/deploy-trigger \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"test_failed\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"repo\": \"${{ github.repository }}\",
              \"run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
