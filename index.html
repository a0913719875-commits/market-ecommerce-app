<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .converter {
            background-color: #1f1f1f;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .converter h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .converter select, .converter input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
        }
        .converter button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #6200ea;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .converter button:hover {
            background-color: #3700b3;
        }
        .converter .result {
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="converter">
        <h1>Unit Converter</h1>
        <select id="conversionType">
            <option value="kmToMiles">Kilometers to Miles</option>
            <option value="milesToKm">Miles to Kilometers</option>
            <option value="kgToPounds">Kilograms to Pounds</option>
            <option value="poundsToKg">Pounds to Kilograms</option>
            <option value="cToF">Celsius to Fahrenheit</option>
            <option value="fToC">Fahrenheit to Celsius</option>
        </select>
        <input type="number" id="inputValue" placeholder="Enter value" />
        <button onclick="convert()">Convert</button>
        <div class="result" id="result"></div>
    </div>
    <script>
        function convert() {
            const conversionType = document.getElementById('conversionType').value;
            const inputValue = parseFloat(document.getElementById('inputValue').value);
            let result;

            if (isNaN(inputValue)) {
                result = "Please enter a valid number.";
            } else {
                switch (conversionType) {
                    case "kmToMiles":
                        result = (inputValue * 0.621371).toFixed(2) + " Miles";
                        break;
                    case "milesToKm":
                        result = (inputValue / 0.621371).toFixed(2) + " Kilometers";
                        break;
                    case "kgToPounds":
                        result = (inputValue * 2.20462).toFixed(2) + " Pounds";
                        break;
                    case "poundsToKg":
                        result = (inputValue / 2.20462).toFixed(2) + " Kilograms";
                        break;
                    case "cToF":
                        result = ((inputValue * 9/5) + 32).toFixed(2) + " °F";
                        break;
                    case "fToC":
                        result = ((inputValue - 32) * 5/9).toFixed(2) + " °C";
                        break;
                    default:
                        result = "Invalid conversion type.";
                }
            }

            document.getElementById('result').textContent = result;
        }
    </script>
</body>
</html>
