<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2e2e2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #timer {
            text-align: center;
        }
        #time {
            font-size: 4em;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1em;
            border: none;
            background-color: #ff5252;
            color: #ffffff;
            cursor: pointer;
            border-radius: 5px;
        }
        button:active {
            opacity: 0.7;
        }
        #mode {
            padding: 5px 10px;
            color: #ff5252;
        }
    </style>
</head>
<body>
    <div id="timer">
        <h1>Pomodoro Timer</h1>
        <div id="mode">Work Mode</div>
        <div id="time">25:00</div>
        <button onclick="startTimer()">Start</button>
        <button onclick="stopTimer()">Stop</button>
        <button onclick="resetTimer()">Reset</button>
    </div>
    <script>
        let isRunning = false;
        let isWorkMode = true;
        let timerInterval;
        let remainingTime = 25 * 60;

        function updateDisplay() {
            let minutes = Math.floor(remainingTime / 60);
            let seconds = remainingTime % 60;
            document.getElementById('time').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('mode').textContent = isWorkMode ? "Work Mode" : "Break Mode";
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timerInterval = setInterval(() => {
                remainingTime--;
                updateDisplay();
                if (remainingTime <= 0) {
                    switchMode();
                }
            }, 1000);
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerInterval);
        }

        function resetTimer() {
            stopTimer();
            remainingTime = isWorkMode ? 25 * 60 : 5 * 60;
            updateDisplay();
        }

        function switchMode() {
            stopTimer();
            isWorkMode = !isWorkMode;
            remainingTime = isWorkMode ? 25 * 60 : 5 * 60;
            updateDisplay();
            startTimer();
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
