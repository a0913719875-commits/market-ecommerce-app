<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒數計時器</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        input[type="number"] {
            width: 60px;
            padding: 5px;
            margin: 0 10px;
            font-size: 18px;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 18px;
            background-color: #555;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #777;
        }
        #timer {
            font-size: 48px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>倒數計時器</h1>
        <input type="number" id="minutes" placeholder="分鐘" min="0">
        <div id="timer">00:00</div>
        <button id="startPauseBtn">開始</button>
    </div>

    <script>
        let interval;
        let isPaused = true;
        let remainingSeconds = 0;

        document.getElementById('startPauseBtn').addEventListener('click', function() {
            if (isPaused) {
                const minutesInput = document.getElementById('minutes').value;
                if (!interval) {
                    const minutes = parseInt(minutesInput, 10) || 0;
                    remainingSeconds = minutes * 60;
                }
                interval = setInterval(updateTimer, 1000);
                this.textContent = '暫停';
            } else {
                clearInterval(interval);
                interval = null;
                this.textContent = '開始';
            }
            isPaused = !isPaused;
        });

        function updateTimer() {
            if (remainingSeconds <= 0) {
                clearInterval(interval);
                document.getElementById('startPauseBtn').textContent = '開始';
                isPaused = true;
                interval = null;
            } else {
                remainingSeconds--;
                const minutes = String(Math.floor(remainingSeconds / 60)).padStart(2, '0');
                const seconds = String(remainingSeconds % 60).padStart(2, '0');
                document.getElementById('timer').textContent = `${minutes}:${seconds}`;
            }
        }
    </script>
</body>
</html>
