<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            width: 400px;
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #00ffcb;
        }
        .task-input {
            display: flex;
            margin-bottom: 20px;
        }
        .task-input input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            margin-right: 5px;
        }
        .task-input button {
            padding: 10px;
            border: none;
            background-color: #00ffcb;
            color: #1e1e1e;
            border-radius: 4px;
            cursor: pointer;
        }
        .task-input button:hover {
            background-color: #02e0b4;
        }
        ul {
            padding: 0;
            list-style: none;
        }
        li {
            background-color: #252525;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task {
            color: #ffffff;
        }
        .completed {
            text-decoration: line-through;
            color: #7f7f7f;
        }
        .progress {
            margin-top: 20px;
            text-align: center;
            color: #7f7f7f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>
        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Add a new task">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
        <div class="progress" id="progress">Progress: 0%</div>
    </div>
    <script>
        const taskList = document.getElementById('taskList');
        const progress = document.getElementById('progress');
        let tasks = [];
        let completedTasks = 0;

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();
            if (taskText) {
                tasks.push({ text: taskText, completed: false });
                taskInput.value = '';
                renderTasks();
            }
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            completedTasks = tasks.filter(task => task.completed).length;
            renderTasks();
        }

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="task ${task.completed ? 'completed' : ''}" onclick="toggleTask(${index})">${task.text}</span>
                `;
                taskList.appendChild(li);
            });
            updateProgress();
        }

        function updateProgress() {
            const progressPercentage = tasks.length ? Math.round((completedTasks / tasks.length) * 100) : 0;
            progress.textContent = `Progress: ${progressPercentage}%`;
        }
    </script>
</body>
</html>
