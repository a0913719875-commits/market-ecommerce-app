<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Card</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1c1c1c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .weather-card {
            background: linear-gradient(145deg, #242424, #1a1a1a);
            border-radius: 20px;
            box-shadow: 5px 5px 10px #141414, -5px -5px 10px #262626;
            color: #fff;
            padding: 20px;
            width: 300px;
            text-align: center;
        }
        .weather-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
        .temperature {
            font-size: 52px;
            margin: 10px 0;
        }
        .humidity {
            font-size: 18px;
            margin-top: 10px;
        }
        .weather-description {
            font-size: 24px;
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="weather-icon">🌥️</div>
    <div class="temperature">15°C</div>
    <div class="weather-description">Cloudy</div>
    <div class="humidity">Humidity: 68%</div>
</div>

</body>
</html>
