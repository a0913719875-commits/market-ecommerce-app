<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長照交通車服務</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="card">
        <header>
            <h1>長照交通車服務</h1>
        </header>
        <main>
            <img src="tesla-style.jpg" alt="交通車" class="hero-image">
            <div class="contact-info">
                <p>John Doe</p>
                <p>聯絡號碼: 123-456-789</p>
                <p>Email: contact@service.com</p>
            </div>
        </main>
        <footer>
            <button class="contact-button" onclick="location.href='tel:123456789'"><i class="fas fa-phone-alt"></i> 立刻聯絡</button>
            <button class="contact-button" onclick="location.href='mailto:contact@service.com'"><i class="fas fa-envelope"></i> Email Us</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
