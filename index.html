<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .stopwatch {
            text-align: center;
        }
        .time-display {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 10px;
        }
        .button {
            background-color: #1f1f1f;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
        }
        .button:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>
    <div class="stopwatch">
        <div class="time-display" id="time-display">00:00:00</div>
        <div class="buttons">
            <button class="button" id="start">Start</button>
            <button class="button" id="pause">Pause</button>
            <button class="button" id="reset">Reset</button>
        </div>
    </div>
    <script>
        let startTime, updatedTime, difference, tInterval, running = 0;

        const timeDisplay = document.getElementById('time-display');
        const startButton = document.getElementById('start');
        const pauseButton = document.getElementById('pause');
        const resetButton = document.getElementById('reset');

        startButton.onclick = function() {
            if (!running) {
                startTime = new Date().getTime();
                tInterval = setInterval(updateTime, 1);
                running = 1;
            }
        };

        pauseButton.onclick = function() {
            if (running) {
                clearInterval(tInterval);
                running = 0;
            }
        };

        resetButton.onclick = function() {
            clearInterval(tInterval);
            running = 0;
            difference = 0;
            timeDisplay.innerHTML = '00:00:00';
        };

        function updateTime() {
            updatedTime = new Date().getTime();
            difference = updatedTime - startTime;

            let hours = Math.floor((difference % 86400000) / 3600000);
            let minutes = Math.floor((difference % 3600000) / 60000);
            let seconds = Math.floor((difference % 60000) / 1000);
            let milliseconds = Math.floor((difference % 1000) / 10);

            hours = (hours < 10) ? '0' + hours : hours;
            minutes = (minutes < 10) ? '0' + minutes : minutes;
            seconds = (seconds < 10) ? '0' + seconds : seconds;
            milliseconds = (milliseconds < 10) ? '0' + milliseconds : milliseconds;

            timeDisplay.innerHTML = `${minutes}:${seconds}:${milliseconds}`;
        }
    </script>
</body>
</html>
