<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貨幣換算機</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #converter {
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        input[type="number"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        .result {
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="converter">
        <h1>貨幣換算機</h1>
        <input type="number" id="twdInput" placeholder="輸入台幣" oninput="convertCurrency()">
        <div class="result" id="usdResult">美金: $0</div>
        <div class="result" id="jpyResult">日幣: ¥0</div>
        <div class="result" id="eurResult">歐元: €0</div>
    </div>

    <script>
        function convertCurrency() {
            const twd = parseFloat(document.getElementById('twdInput').value);
            if (isNaN(twd)) {
                document.getElementById('usdResult').textContent = '美金: $0';
                document.getElementById('jpyResult').textContent = '日幣: ¥0';
                document.getElementById('eurResult').textContent = '歐元: €0';
                return;
            }
            
            const usdRate = 0.032; // 1 TWD = 0.032 USD
            const jpyRate = 3.58;  // 1 TWD = 3.58 JPY
            const eurRate = 0.029; // 1 TWD = 0.029 EUR

            const usd = (twd * usdRate).toFixed(2);
            const jpy = (twd * jpyRate).toFixed(2);
            const eur = (twd * eurRate).toFixed(2);

            document.getElementById('usdResult').textContent = `美金: $${usd}`;
            document.getElementById('jpyResult').textContent = `日幣: ¥${jpy}`;
            document.getElementById('eurResult').textContent = `歐元: €${eur}`;
        }
    </script>
</body>
</html>
